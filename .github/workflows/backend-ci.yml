name: Backend CI

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main

jobs:
  test-backend:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the Python version we want
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip packages so the workflow runs faster next time
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install all backend dependencies (including pytest + httpx we added)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 5. Run all tests inside backend/tests/
      - name: Run pytest
        run: |
          pytest backend/tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          MAIN_SUPABASE_URL: ${{ secrets.MAIN_SUPABASE_URL }}
          MAIN_SUPABASE_KEY: ${{ secrets.MAIN_SUPABASE_KEY }}
          MODEL_SUPABASE_URL: ${{ secrets.MODEL_SUPABASE_URL }}
          MODEL_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MODEL_SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PUTER_TOKEN: ${{ secrets.PUTER_TOKEN }}
          SUPABASE_URL: ${{ secrets.MODEL_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MODEL_SUPABASE_SERVICE_ROLE_KEY }}
